<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마법실종사건</title>

<style>
/* 공통 애니메이션 */
.fade-out { opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
.fade-in { opacity: 1 !important; transition: opacity 0.6s ease; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}
.shake { animation: shake 0.35s; }

body { margin: 0; background: #ddd; display: flex; justify-content: center; font-family: 'Inter', sans-serif; }

.screen {
    position: relative;
    width: 100vw;
    min-height: 100vh;
    background: #F3EFE6;
    overflow: hidden;
}

/* 상단 공통 */
.title-pill {
    position: absolute; top: 87px; left: 6.5%; width: 136px; height: 33px;
    background: #fff; border-radius: 20px; box-shadow: 0 4px 4px rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #6B4D20; font-size: 20px; z-index: 100;
}

.progress {
    position: absolute; top: 93px; right: 6.5%;
    font-weight: 700; color: #6B4D20; font-size: 16px; z-index: 100;
}

/* --- [화면 1: 문제 영역] --- */
.question-area { position: absolute; width: 100%; top: 136px; z-index: 10; }
.question-text { margin-top: 30px; text-align: center; color: #6B4D20; }
.question-text .line1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
.question-text .line2 { font-size: 18px; margin-bottom: 25px; }
.answer-box {
    width: 87%; height: 46px; background: #FEFCF7; border: 1px solid #6B4D20;
    border-radius: 10px; display: flex; margin: 0 auto;
}
.answer-box input { width: 100%; border: none; outline: none; background: transparent; font-size: 20px; text-align: center; }

/* --- [화면 2: 슬라이더 영역] --- */
#screen2 {
    position: absolute; top: 136px; left: 6.5%; width: 87%; display: none; opacity: 0;
}
.slider-container {
    width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 12px; overflow: hidden; position: relative;
}
.slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.4s ease-out; }
.slider-wrapper img { width: 100%; height: 100%; flex-shrink: 0; object-fit: cover; }

.nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; background: rgba(0,0,0,0.3); color: white;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.prev-btn { left: 10px; } .next-btn { right: 10px; }

#nextStepBtn {
    display: none; width: 100%; height: 50px; background: #6B4D20; color: white;
    border: none; border-radius: 10px; margin-top: 20px; font-size: 18px; font-weight: 700; cursor: pointer;
}

/* --- [화면 3: 결과 영역] --- */
#screen3 { position: absolute; width: 100%; top: 162px; display: none; opacity: 0; text-align: center; }
.image-answer { width: 238px; height: 356px; margin: 0 auto; background: url("image1.png") center/contain no-repeat; }


</style>
</head>

<body>

<div class="screen">
    <div class="title-pill">십자말풀이</div>
    <div class="progress">진행률 50%</div>

    <div id="questionArea" class="question-area">
        <div class="question-text">
            <div class="line1">십자말풀이의 굵은 칸의 글자들을</div>
            <div class="line1">세로로 읽어보세요</div>
            <div class="line2">정답은 무엇인가요?</div>
        </div>
        <div class="answer-box">
            <input id="answerInput" type="text" placeholder="정답 입력">
        </div>
    </div>

    <div id="screen2">
        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper">
                <img src="photo1.png" alt="1">
                <img src="photo2.png" alt="2">
                <img src="photo3.png" alt="3">
            </div>
            <div class="nav-btn prev-btn" id="prevBtn">❮</div>
            <div class="nav-btn next-btn" id="nextBtn">❯</div>
        </div>
        <div style="text-align: center; margin-top: 10px; color:#6B4D20; font-weight:700;" id="pageIdx">1 / 3</div>
        <button id="nextStepBtn">다음으로 가기</button>
    </div>

    <div id="screen3">
        <div class="image-answer"></div>
    </div>
</div>

<script>
    const input = document.getElementById("answerInput");
    const qArea = document.getElementById("questionArea");
    const s2 = document.getElementById("screen2");
    const s3 = document.getElementById("screen3");
    const answerBox = document.querySelector(".answer-box");
    
    const wrapper = document.getElementById("sliderWrapper");
    const images = document.querySelectorAll(".slider-wrapper img");
    const nextStepBtn = document.getElementById("nextStepBtn");
    const pageIdxText = document.getElementById("pageIdx");

    let currentIndex = 0;
    const totalImages = images.length;
    const CORRECT_ANSWER = "마법실종사건";

    // [로직 1] 정답 체크 및 화면 1 -> 화면 2 전환
    function checkAnswer(isAuto = false) {
        if (input.value.trim() === CORRECT_ANSWER) {
            qArea.classList.add("fade-out");
            setTimeout(() => {
                qArea.style.display = "none";
                s2.style.display = "block";
                setTimeout(() => s2.classList.add("fade-in"), 50);
            }, 600);
        } else if (!isAuto) {
            answerBox.classList.add("shake");
            setTimeout(() => answerBox.classList.remove("shake"), 350);
        }
    }

    input.addEventListener("input", () => {
        if (input.value.trim().length === CORRECT_ANSWER.length) checkAnswer(true);
    });
    input.addEventListener("keydown", (e) => { if(e.key === "Enter") checkAnswer(false); });

    // [로직 2] 화면 2 슬라이더 제어
    function updateSlider() {
        wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
        pageIdxText.innerText = `${currentIndex + 1} / ${totalImages}`;
        
        // 마지막 이미지일 때만 '다음으로 가기' 버튼 노출
        if (currentIndex === totalImages - 1) {
            nextStepBtn.style.display = "block";
        } else {
            nextStepBtn.style.display = "none";
        }
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
        if (currentIndex < totalImages - 1) {
            currentIndex++;
            updateSlider();
        }
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentIndex > 0) {
            currentIndex--;
            updateSlider();
        }
    });

    // [로직 3] 화면 2 -> 화면 3 전환
    nextStepBtn.addEventListener("click", () => {
        s2.classList.add("fade-out");
        setTimeout(() => {
            s2.style.display = "none";
            s3.style.display = "block";
            setTimeout(() => s3.classList.add("fade-in"), 50);
        }, 600);
    });

</script>

</body>
</html>
